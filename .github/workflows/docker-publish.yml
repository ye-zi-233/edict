name: Build and Push Docker Images

on:
  push:
    branches: [docker, feature/cat-kingdom]
  workflow_dispatch:

env:
  BACKEND_IMAGE: li2412360774/edict-backend
  FRONTEND_IMAGE: li2412360774/edict-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 根据分支名生成镜像 tag，避免不同分支互相覆盖
      - name: Determine image tag from branch
        id: tag
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "feature/cat-kingdom" ]; then
            echo "tag=cat-kingdom" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: edict/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: edict/frontend
          file: edict/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
