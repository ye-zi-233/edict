# ⚔️ 三省六部 · 全功能 Docker 部署
#
# 前提条件：
#   1. OpenClaw Gateway 已运行且可通过网络访问
#   2. 复制 .env.example 为 .env 并配置各项参数
#
# 启动: docker compose up -d
# 访问: http://localhost:7891
# 停止: docker compose down

version: "3.9"

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "${DASHBOARD_PORT:-7891}:7891"
    volumes:
      - edict_data:/app/data
      - ${OPENCLAW_HOME:-~/.openclaw}:/home/appuser/.openclaw
    environment:
      - HOME=/home/appuser
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7891/healthz')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - edict_data:/app/data
      - ${OPENCLAW_HOME:-~/.openclaw}:/home/appuser/.openclaw
    environment:
      - HOME=/home/appuser
      - DASHBOARD_URL=http://dashboard:7891
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-http://host.docker.internal:18789}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      dashboard:
        condition: service_healthy
    command: ["bash", "/app/scripts/run_loop.sh", "${SYNC_INTERVAL:-15}"]
    restart: unless-stopped

volumes:
  edict_data:
